components:
  schemas:
    transfer-process-schema:
      title: TransferProcessSchema
      type: object
      example:
        stateTimestamp: 0
        '@type': '@type'
        type: CONSUMER
        '@context': "{}"
        assetId: assetId
        dataplaneMetadata: "{}"
        callbackAddresses:
        - "{}"
        - "{}"
        contractId: contractId
        transferType: transferType
        errorDetail: errorDetail
        correlationId: correlationId
        '@id': '@id'
        state: state
      allOf:
      - $ref: "#/components/schemas/TransferProcess"
    TransferProcess:
      required:
      - '@context'
      - '@id'
      - '@type'
      - state
      - stateTimestamp
      - type
      type: object
      properties:
        '@context':
          $ref: https://w3id.org/edc/connector/management/schema/v4/context-schema.json
        '@type':
          type: string
        '@id':
          type: string
        type:
          type: string
          enum:
          - CONSUMER
          - PROVIDER
        state:
          type: string
        stateTimestamp:
          type: integer
        callbackAddresses:
          type: array
          items:
            $ref: https://w3id.org/edc/connector/management/schema/v4/callback-address-schema.json
        correlationId:
          type: string
        assetId:
          type: string
        contractId:
          type: string
        transferType:
          type: string
        errorDetail:
          type: string
        dataplaneMetadata:
          $ref: https://w3id.org/edc/connector/management/schema/v4/dataplane-metadata-schema.json
    context-schema:
      title: ContextSchema
      type: array
      items:
        type: string
    ContextSchema:
      type: array
      items:
        type: array
        items:
          type: string
    callback-address-schema:
      title: CallbackAddressSchema
      type: object
      allOf:
      - $ref: "#/components/schemas/CallbackAddress"
    CallbackAddress:
      required:
      - '@type'
      - events
      - transactional
      - uri
      type: object
      properties:
        '@type':
          type: string
        transactional:
          type: boolean
        uri:
          type: string
        events:
          type: array
          items:
            type: string
        authKey:
          type: string
        authCodeId:
          type: string
    dataplane-metadata-schema:
      title: DataplaneMetadataSchema
      type: object
      allOf:
      - $ref: "#/components/schemas/DataplaneMetadata"
    DataplaneMetadata:
      required:
      - '@type'
      type: object
      properties:
        '@type':
          type: string
        labels:
          type: array
          items:
            type: string
        properties:
          type: object
          example:
            key: value
        profiles:
          type: array
          items:
            type: string
    api-error-schema:
      title: ApiErrorSchema
      type: object
      example:
        path: path
        message: message
        type: type
        invalidValue: invalidValue
      allOf:
      - $ref: "#/components/schemas/ApiError"
    ApiError:
      required:
      - message
      - type
      type: object
      properties:
        message:
          type: string
        type:
          type: string
        path:
          type: string
        invalidValue:
          type: string
    cel-expression-test-response-schema:
      title: CelExpressionTestRequestSchema
      type: object
      example:
        '@type': '@type'
        evaluationResult: true
        error: error
        '@context': "{}"
      allOf:
      - $ref: "#/components/schemas/CelExpressionTestResponse"
    CelExpressionTestResponse:
      required:
      - '@context'
      - '@type'
      type: object
      properties:
        '@context':
          $ref: https://w3id.org/edc/connector/management/schema/v4/context-schema.json
        '@type':
          type: string
        evaluationResult:
          type: boolean
        error:
          type: string
    cel-expression-test-request-schema:
      title: CelExpressionTestRequestSchema
      type: object
      allOf:
      - $ref: "#/components/schemas/CelExpressionTestRequest"
    CelExpressionTestRequest:
      required:
      - '@context'
      - '@type'
      - expression
      - leftOperand
      - operator
      - rightOperand
      type: object
      properties:
        '@context':
          $ref: https://w3id.org/edc/connector/management/schema/v4/context-schema.json
        '@type':
          type: string
        expression:
          type: string
        leftOperand:
          type: string
        operator:
          type: string
        rightOperand:
          $ref: "#/components/schemas/CelExpressionTestRequest_rightOperand"
        params:
          type: object
    AssetOutputV3:
      type: object
      properties:
        '@id':
          type: string
        '@type':
          type: string
          example: https://w3id.org/edc/v0.0.1/ns/Asset
        createdAt:
          type: integer
          format: int64
        dataAddress:
          $ref: ./asset-api.yaml#/components/schemas/DataAddress
        privateProperties:
          $ref: ./asset-api.yaml#/components/schemas/Properties
        properties:
          $ref: ./asset-api.yaml#/components/schemas/Properties
      example:
        '@context':
          '@vocab': https://w3id.org/edc/v0.0.1/ns/
        '@id': asset-id
        properties:
          key: value
        privateProperties:
          privateKey: privateValue
        dataAddress:
          type: HttpData
          baseUrl: https://jsonplaceholder.typicode.com/todos
        createdAt: 1688465655
    DataAddress:
      type: object
      properties:
        '@type':
          type: string
          example: https://w3id.org/edc/v0.0.1/ns/DataAddress
        type:
          type: string
      additionalProperties: true
    Properties:
      type: object
      additionalProperties: true
    ApiErrorDetail:
      type: object
      properties:
        invalidValue:
          type: string
        message:
          type: string
        path:
          type: string
        type:
          type: string
      example:
        message: error message
        type: ErrorType
        path: object.error.path
        invalidValue: this value is not valid
    id-response-schema:
      title: IdResponseSchema
      type: object
      example:
        createdAt: 0.8008281904610115
        '@type': '@type'
        '@id': '@id'
        '@context': "{}"
      allOf:
      - $ref: "#/components/schemas/IdResponse"
    IdResponse:
      required:
      - '@context'
      - '@id'
      - '@type'
      - createdAt
      type: object
      properties:
        '@context':
          $ref: https://w3id.org/edc/connector/management/schema/v4/context-schema.json
        '@type':
          type: string
        '@id':
          type: string
        createdAt:
          type: number
    policy-definition-schema:
      title: PolicyDefinitionSchema
      type: object
      allOf:
      - $ref: "#/components/schemas/PolicyDefinition"
    PolicyDefinition:
      required:
      - '@context'
      - '@type'
      - policy
      type: object
      properties:
        '@context':
          $ref: https://w3id.org/edc/connector/management/schema/v4/context-schema.json
        '@type':
          type: string
        '@id':
          type: string
        policy:
          $ref: https://w3id.org/edc/connector/management/schema/v4/policy-definition-schema.json#/definitions/PolicyClass
        privateProperties:
          type: object
          example:
            privateKey: privateValue
    PolicyClass:
      required:
      - '@type'
      type: object
      properties:
        '@type':
          type: string
        profile:
          $ref: "#/components/schemas/PolicyClass_profile"
        permission:
          minItems: 1
          type: array
          items:
            $ref: https://w3id.org/dspace/2025/1/negotiation/contract-schema.json#/definitions/Permission
        prohibition:
          minItems: 1
          type: array
          items:
            $ref: https://w3id.org/dspace/2025/1/negotiation/contract-schema.json#/definitions/Prohibition
        obligation:
          minItems: 1
          type: array
          items:
            $ref: https://w3id.org/dspace/2025/1/negotiation/contract-schema.json#/definitions/Duty
    Permission:
      type: object
      allOf:
      - $ref: "#/components/schemas/Rule"
    Rule:
      required:
      - action
      type: object
      properties:
        action:
          $ref: https://w3id.org/dspace/2025/1/negotiation/contract-schema.json#/definitions/Action
        constraint:
          type: array
          items:
            $ref: "#/components/schemas/Constraint"
    Action:
      type: string
    Constraint:
      type: object
      oneOf:
      - $ref: "#/components/schemas/LogicalConstraint"
      - $ref: "#/components/schemas/AtomicConstraint"
    LogicalConstraint:
      type: object
      properties:
        and:
          type: array
          items:
            $ref: "#/components/schemas/Constraint"
        andSequence:
          type: array
          items:
            $ref: "#/components/schemas/Constraint"
        or:
          type: array
          items:
            $ref: "#/components/schemas/Constraint"
        xone:
          type: array
          items:
            $ref: "#/components/schemas/Constraint"
      nullable: true
    AtomicConstraint:
      required:
      - leftOperand
      - operator
      - rightOperand
      type: object
      properties:
        rightOperand:
          $ref: https://w3id.org/dspace/2025/1/negotiation/contract-schema.json#/definitions/RightOperand
        leftOperand:
          $ref: https://w3id.org/dspace/2025/1/negotiation/contract-schema.json#/definitions/LeftOperand
        operator:
          $ref: https://w3id.org/dspace/2025/1/negotiation/contract-schema.json#/definitions/Operator
    RightOperand:
      oneOf:
      - type: string
      - type: object
      - type: array
        items:
          type: string
          description: TODO default missing array inner type to string
    LeftOperand:
      type: string
    Operator:
      type: string
      enum:
      - eq
      - gt
      - gteq
      - lteq
      - hasPart
      - isA
      - isAllOf
      - isAnyOf
      - isNoneOf
      - isPartOf
      - lt
      - term-lteq
      - neq
    Prohibition:
      type: object
      allOf:
      - $ref: "#/components/schemas/Rule"
    Duty:
      type: object
      allOf:
      - required:
        - action
        properties:
          action:
            $ref: "#/components/schemas/Action"
          constraint:
            type: array
            items:
              $ref: "#/components/schemas/Constraint"
    asset-schema:
      title: AssetSchema
      type: object
      example:
        '@type': '@type'
        dataplaneMetadata: "{}"
        '@id': '@id'
        privateProperties:
          privateKey: privateValue
        '@context': "{}"
        properties:
          key: value
      allOf:
      - $ref: "#/components/schemas/Asset"
    Asset:
      required:
      - '@context'
      - '@type'
      - properties
      type: object
      properties:
        '@context':
          $ref: https://w3id.org/edc/connector/management/schema/v4/context-schema.json
        '@type':
          type: string
        '@id':
          type: string
        properties:
          $ref: "#/components/schemas/Asset_properties"
        privateProperties:
          type: object
          example:
            privateKey: privateValue
        dataplaneMetadata:
          $ref: https://w3id.org/edc/connector/management/schema/v4/dataplane-metadata-schema.json
    ContractAgreement:
      type: object
      properties:
        '@id':
          type: string
        '@type':
          type: string
          example: https://w3id.org/edc/v0.0.1/ns/ContractAgreement
        assetId:
          type: string
        consumerId:
          type: string
        contractSigningDate:
          type: integer
          format: int64
        policy:
          $ref: ./contract-negotiation-api.yaml#/components/schemas/Policy
        providerId:
          type: string
      example:
        '@context':
          '@vocab': https://w3id.org/edc/v0.0.1/ns/
        '@type': https://w3id.org/edc/v0.0.1/ns/ContractAgreement
        '@id': negotiation-id
        providerId: provider-id
        consumerId: consumer-id
        assetId: asset-id
        contractSigningDate: 1688465655
        policy:
          '@context': http://www.w3.org/ns/odrl.jsonld
          '@type': Set
          '@id': offer-id
          permission:
          - target: asset-id
            action: display
    Policy:
      type: object
      description: ODRL policy
      example:
        '@context': http://www.w3.org/ns/odrl.jsonld
        '@id': 0949ba30-680c-44e6-bc7d-1688cbe1847e
        '@type': odrl:Set
        permission:
          target: http://example.com/asset:9898.movie
          action:
            type: http://www.w3.org/ns/odrl/2/use
          constraint:
            leftOperand: https://w3id.org/edc/v0.0.1/ns/left
            operator: eq
            rightOperand: value
        prohibition: []
        obligation: []
    catalog-schema:
      title: CatalogSchema
      type: object
      example:
        participantId: participantId
        '@context': "{}"
      allOf:
      - $ref: "#/components/schemas/RootCatalog"
    RootCatalog:
      type: object
      allOf:
      - $ref: "#/components/schemas/Catalog"
      - required:
        - '@context'
        - participantId
        type: object
        properties:
          '@context':
            $ref: https://w3id.org/dspace/2025/1/common/context-schema.json
          participantId:
            type: string
        example: null
      example: null
    Catalog:
      required:
      - '@id'
      - '@type'
      type: object
      allOf:
      - $ref: https://w3id.org/dspace/2025/1/catalog/dataset-schema.json#/definitions/AbstractDataset
      - properties:
          '@type':
            type: string
          dataset:
            minItems: 1
            type: array
            items:
              $ref: https://w3id.org/dspace/2025/1/catalog/dataset-schema.json#/definitions/Dataset
          catalog:
            minItems: 1
            type: array
            items:
              $ref: "#/components/schemas/Catalog"
          service:
            minItems: 1
            type: array
            items:
              $ref: https://w3id.org/dspace/2025/1/catalog/dataset-schema.json#/definitions/DataService
      anyOf:
      - not:
          required:
          - hasPolicy
    AbstractDataset:
      type: object
      allOf:
      - $ref: "#/components/schemas/Resource"
      - properties:
          distribution:
            minItems: 1
            type: array
            items:
              $ref: "#/components/schemas/Distribution"
    Resource:
      required:
      - '@id'
      type: object
      properties:
        '@id':
          type: string
    Distribution:
      required:
      - accessService
      - format
      type: object
      properties:
        hasPolicy:
          minItems: 1
          type: array
          items:
            $ref: https://w3id.org/dspace/2025/1/negotiation/contract-schema.json#/definitions/Offer
        accessService:
          $ref: "#/components/schemas/Distribution_accessService"
        format:
          type: string
    Offer:
      type: object
      not:
        required:
        - target
      allOf:
      - $ref: "#/components/schemas/PolicyClass_1"
      - properties:
          '@type':
            type: string
      - nullable: true
    PolicyClass_1:
      required:
      - '@id'
      type: object
      properties:
        '@id':
          type: string
        profile:
          $ref: "#/components/schemas/PolicyClass_profile"
        permission:
          minItems: 1
          type: array
          items:
            $ref: "#/components/schemas/Permission"
        prohibition:
          minItems: 1
          type: array
          items:
            $ref: "#/components/schemas/Prohibition"
        obligation:
          minItems: 1
          type: array
          items:
            $ref: "#/components/schemas/Duty"
    DataService:
      type: object
      allOf:
      - $ref: "#/components/schemas/Resource"
      - required:
        - '@type'
        - endpointURL
        properties:
          '@type':
            type: string
          endpointURL:
            type: string
          servesDataset:
            minItems: 1
            type: array
            items:
              $ref: "#/components/schemas/Dataset"
    Dataset:
      type: object
      allOf:
      - $ref: "#/components/schemas/AbstractDataset"
      - required:
        - hasPolicy
        type: object
        properties:
          hasPolicy:
            minItems: 1
            type: array
            items:
              $ref: https://w3id.org/dspace/2025/1/negotiation/contract-schema.json#/definitions/Offer
        example: null
      example: null
    context-schema_1:
      title: ContextSchema
      type: array
      items:
        type: string
    query-spec-schema:
      title: QuerySpecSchema
      type: object
      allOf:
      - $ref: "#/components/schemas/QuerySpecRoot"
