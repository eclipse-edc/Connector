openapi: 3.0.1
info:
  title: management-api
  description: REST API documentation for the management-api
  license:
    name: "The Apache License, Version 2.0"
    url: http://www.apache.org/licenses/LICENSE-2.0.txt
  version: 4.1.0
servers:
- url: /
paths:
  /v4/transferprocesses/{id}:
    get:
      tags:
      - Transfer Process v4
      description: Gets an transfer process with the given ID
      operationId: getTransferProcessV4
      parameters:
      - name: id
        in: path
        required: true
        style: simple
        explode: false
        schema:
          type: string
      responses:
        "200":
          description: The transfer process
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/transfer-process-schema"
        "400":
          description: "Request was malformed, e.g. id was null"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/api-error-schema"
        "404":
          description: A transfer process with the given ID does not exist
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/api-error-schema"
  /v5beta/participants/{participantContextId}/transferprocesses/{id}:
    get:
      tags:
      - Transfer Process v5beta
      description: Gets an transfer process with the given ID
      operationId: getTransferProcessV5
      parameters:
      - name: participantContextId
        in: path
        required: true
        style: simple
        explode: false
        schema:
          type: string
      - name: id
        in: path
        required: true
        style: simple
        explode: false
        schema:
          type: string
      responses:
        "200":
          description: The transfer process
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/transfer-process-schema"
        "400":
          description: "Request was malformed, e.g. id was null"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/api-error-schema"
        "404":
          description: A transfer process with the given ID does not exist
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/api-error-schema"
  /v5beta/celexpressions/test:
    post:
      tags:
      - Cel Expressions v5beta
      description: Test a Cel Expression.
      operationId: testExpressionV5
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/cel-expression-test-request-schema"
      responses:
        "200":
          description: The Cel Expression was tested successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/cel-expression-test-response-schema"
        "400":
          description: "Request body was malformed, or the request could not be processed"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/api-error-schema"
        "401":
          description: "The request could not be completed, because either the authentication\
            \ was missing or was not valid."
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/api-error-schema"
  /v5beta/participants/{participantContextId}/policydefinitions:
    post:
      tags:
      - Policy Definition v5beta
      description: Creates a new policy definition
      operationId: createPolicyDefinitionV5
      parameters:
      - name: participantContextId
        in: path
        required: true
        style: simple
        explode: false
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/policy-definition-schema"
      responses:
        "200":
          description: policy definition was created successfully. Returns the Policy
            Definition Id and created timestamp
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/id-response-schema"
        "400":
          description: Request body was malformed
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/api-error-schema"
        "409":
          description: "Could not create policy definition, because a contract definition\
            \ with that ID already exists"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/api-error-schema"
  /v4/policydefinitions:
    post:
      tags:
      - Policy Definition v4
      description: Creates a new policy definition
      operationId: createPolicyDefinitionV4
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/policy-definition-schema"
      responses:
        "200":
          description: policy definition was created successfully. Returns the Policy
            Definition Id and created timestamp
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/id-response-schema"
        "400":
          description: Request body was malformed
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/api-error-schema"
        "409":
          description: "Could not create policy definition, because a contract definition\
            \ with that ID already exists"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/api-error-schema"
  /v4/assets/{id}:
    get:
      tags:
      - Asset v4
      description: Gets an asset with the given ID
      operationId: getAssetV4
      parameters:
      - name: id
        in: path
        required: true
        style: simple
        explode: false
        schema:
          type: string
      responses:
        "200":
          description: The asset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/asset-schema"
        "400":
          description: "Request was malformed, e.g. id was null"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/api-error-schema"
        "404":
          description: An asset with the given ID does not exist
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/api-error-schema"
    delete:
      tags:
      - Asset v4
      description: "Removes an asset with the given ID if possible. Deleting an asset\
        \ is only possible if that asset is not yet referenced by a contract agreement,\
        \ in which case an error is returned. DANGER ZONE: Note that deleting assets\
        \ can have unexpected results, especially for contract offers that have been\
        \ sent out or ongoing or contract negotiations."
      operationId: removeAssetV4
      parameters:
      - name: id
        in: path
        required: true
        style: simple
        explode: false
        schema:
          type: string
      responses:
        "204":
          description: Asset was deleted successfully
        "400":
          description: "Request was malformed, e.g. id was null"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/api-error-schema"
        "404":
          description: An asset with the given ID does not exist
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/api-error-schema"
        "409":
          description: "The asset cannot be deleted, because it is referenced by a\
            \ contract agreement"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/api-error-schema"
  /v4/catalogs/request:
    post:
      tags:
      - Catalogs v4
      description: Obtains all catalogs currently held by this cache instance
      operationId: requestCatalogsV4
      parameters:
      - name: flatten
        in: query
        required: false
        style: form
        explode: true
        schema:
          type: boolean
          default: false
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/query-spec-schema"
      responses:
        "200":
          description: "A list of catalogs is returned, potentially empty"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/catalog-schema"
        "500":
          description: A query could not be completed due to an internal error
  /v4/catalog/request:
    post:
      tags:
      - Catalog v4
      operationId: requestCatalogV4
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/catalog-request-schema"
      responses:
        default:
          description: Gets contract offers (=catalog) of a single connector
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/catalog-schema"
  /v5beta/participants/{participantContextId}/assets/{id}:
    get:
      tags:
      - Asset v5beta
      description: Gets an asset with the given ID
      operationId: getAssetV5
      parameters:
      - name: participantContextId
        in: path
        required: true
        style: simple
        explode: false
        schema:
          type: string
      - name: id
        in: path
        required: true
        style: simple
        explode: false
        schema:
          type: string
      responses:
        "200":
          description: The asset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/asset-schema"
        "400":
          description: "Request was malformed, e.g. id was null"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ApiErrorDetail"
        "404":
          description: An asset with the given ID does not exist
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ApiErrorDetail"
  /v5beta/participants/{participantContextId}/contractnegotiations/{id}:
    get:
      tags:
      - Contract Negotiation v5beta
      description: Gets a contract negotiation with the given ID
      operationId: getNegotiationV5
      parameters:
      - name: participantContextId
        in: path
        required: true
        style: simple
        explode: false
        schema:
          type: string
      - name: id
        in: path
        required: true
        style: simple
        explode: false
        schema:
          type: string
      responses:
        "200":
          description: The contract negotiation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/contract-negotiation-schema"
        "400":
          description: "Request was malformed, e.g. id was null"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/api-error-schema"
        "404":
          description: An contract negotiation with the given ID does not exist
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/api-error-schema"
    delete:
      tags:
      - Contract Negotiation v5beta
      description: Deletes the contract negotiation with the given ID. Only terminated
        negotiations without agreement will be deleted
      operationId: deleteNegotiationV5
      parameters:
      - name: participantContextId
        in: path
        required: true
        style: simple
        explode: false
        schema:
          type: string
      - name: id
        in: path
        required: true
        style: simple
        explode: false
        schema:
          type: string
      responses:
        "204":
          description: ContractNegotiation is deleted
          links:
            poll-state:
              operationId: getNegotiationStateV3
        "400":
          description: "Request was malformed, e.g. id was null"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/api-error-schema"
        "404":
          description: A contract negotiation with the given ID does not exist
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/api-error-schema"
        "409":
          description: The given contract negotiation cannot be deleted due to a wrong
            state or has existing contract agreement
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/api-error-schema"
  /v5beta/schemavalidators:
    get:
      tags:
      - Schema Validator Registration v5beta
      description: Returns all schema validator registrations.
      operationId: getAll
      responses:
        "200":
          description: The registrations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/schema-validator-registration-schema"
        "401":
          description: "The request could not be completed, because either the authentication\
            \ was missing or was not valid."
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/api-error-schema"
    post:
      tags:
      - Schema Validator Registration v5beta
      description: Registers a custom schema validator that validates request bodies
        of the given 'validatedType' against the referenced 'schema' for the given
        management API 'version'.
      operationId: create
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/schema-validator-registration-schema"
      responses:
        "200":
          description: The created registration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/id-response-schema"
        "400":
          description: "Request body was malformed, or the referenced schema is not\
            \ cached"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/api-error-schema"
        "401":
          description: "The request could not be completed, because either the authentication\
            \ was missing or was not valid."
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/api-error-schema"
  /v4/contractnegotiations/{id}/state:
    get:
      tags:
      - Contract Negotiation v4
      description: Gets the state of a contract negotiation with the given ID
      operationId: getNegotiationStateV4
      parameters:
      - name: id
        in: path
        required: true
        style: simple
        explode: false
        schema:
          type: string
      responses:
        "200":
          description: The contract negotiation's state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NegotiationState"
        "400":
          description: "Request was malformed, e.g. id was null"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/api-error-schema"
        "404":
          description: An contract negotiation with the given ID does not exist
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/api-error-schema"
  /v5beta/participants/{participantContextId}/contractdefinitions/{id}:
    get:
      tags:
      - Contract Definition v5beta
      description: Gets an contract definition with the given ID
      operationId: getContractDefinitionV5
      parameters:
      - name: participantContextId
        in: path
        required: true
        style: simple
        explode: false
        schema:
          type: string
      - name: id
        in: path
        required: true
        style: simple
        explode: false
        schema:
          type: string
      responses:
        "200":
          description: The contract definition
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/contract-definition-schema"
        "400":
          description: "Request was malformed, e.g. id was null"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/api-error-schema"
        "404":
          description: An contract agreement with the given ID does not exist
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/api-error-schema"
    delete:
      tags:
      - Contract Definition v5beta
      description: "Removes a contract definition with the given ID if possible. DANGER\
        \ ZONE: Note that deleting contract definitions can have unexpected results,\
        \ especially for contract offers that have been sent out or ongoing or contract\
        \ negotiations."
      operationId: deleteContractDefinitionV5
      parameters:
      - name: participantContextId
        in: path
        required: true
        style: simple
        explode: false
        schema:
          type: string
      - name: id
        in: path
        required: true
        style: simple
        explode: false
        schema:
          type: string
      responses:
        "204":
          description: Contract definition was deleted successfully
        "400":
          description: "Request was malformed, e.g. id was null"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/api-error-schema"
        "404":
          description: A contract definition with the given ID does not exist
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/api-error-schema"
  /v4/contractnegotiations/request:
    post:
      tags:
      - Contract Negotiation v4
      description: Returns all contract negotiations according to a query
      operationId: queryNegotiationsV4
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/query-spec-schema"
      responses:
        "200":
          description: The contract negotiations that match the query
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/contract-negotiation-schema"
        "400":
          description: Request was malformed
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/api-error-schema"
  /v5beta/dataspaceprofiles:
    post:
      tags:
      - Dataspace Profile v5beta
      description: Creates a new dataspace profile. On success the profile is persisted
        and registered into the running connector's dataspace profile context registry.
      operationId: createProfileV5
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/createProfileV5_request"
      responses:
        "200":
          description: The dataspace profile was created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/dataspace-profile-schema"
        "400":
          description: "Request body was malformed, or the request could not be processed"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/api-error-schema"
        "409":
          description: A dataspace profile with the given name already exists
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/api-error-schema"
  /v5beta/participants/{participantContextId}/transferprocesses/request:
    post:
      tags:
      - Transfer Process v5beta
      description: Returns all transfer process according to a query
      operationId: queryTransferProcessesV5
      parameters:
      - name: participantContextId
        in: path
        required: true
        style: simple
        explode: false
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/query-spec-schema"
      responses:
        "200":
          description: The transfer processes matching the query
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/transfer-process-schema"
        "400":
          description: Request was malformed
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/api-error-schema"
  /v5beta/cacheddocuments:
    get:
      tags:
      - Document Cache v5beta
      description: Returns all cached documents.
      operationId: getAll
      responses:
        "200":
          description: The cached contexts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/cached-document-schema"
        "401":
          description: "The request could not be completed, because either the authentication\
            \ was missing or was not valid."
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/api-error-schema"
    post:
      tags:
      - Document Cache v5beta
      description: "Adds a document to the cache. Depending on the 'pullStrategy'\
        \ (NEVER, IF_NOT_PRESENT, ALWAYS) the document is either supplied inline via\
        \ 'content' or fetched from 'url'."
      operationId: create
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/cached-document-schema"
      responses:
        "200":
          description: The created context
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/id-response-schema"
        "400":
          description: "Request body was malformed, or the request could not be processed"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/api-error-schema"
        "401":
          description: "The request could not be completed, because either the authentication\
            \ was missing or was not valid."
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/api-error-schema"
  /v5beta/celexpressions:
    post:
      tags:
      - Cel Expressions v5beta
      description: Create a Cel Expression.
      operationId: createExpressionV5
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/cel-expression-schema"
      responses:
        "200":
          description: The Cel Expression was created successfully
        "400":
          description: "Request body was malformed, or the request could not be processed"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/api-error-schema"
        "401":
          description: "The request could not be completed, because either the authentication\
            \ was missing or was not valid."
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/api-error-schema"
        "409":
          description: "Can't create the Cel expression, because a object with the\
            \ same ID already exists"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/api-error-schema"
  /v5beta/participants/{participantContextId}/contractnegotiations/request:
    post:
      tags:
      - Contract Negotiation v5beta
      description: Returns all contract negotiations according to a query
      operationId: queryNegotiationsV5
      parameters:
      - name: participantContextId
        in: path
        required: true
        style: simple
        explode: false
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/query-spec-schema"
      responses:
        "200":
          description: The contract negotiations that match the query
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/contract-negotiation-schema"
        "400":
          description: Request was malformed
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/api-error-schema"
  /v5beta/participants/{participantContextId}/dataplanes:
    put:
      tags:
      - Dataplane Signaling Registration v5beta
      description: Register or update a Dataplane instance
      operationId: registerV5
      parameters:
      - name: participantContextId
        in: path
        required: true
        style: simple
        explode: false
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DataPlaneRegistrationMessage"
      responses:
        "200":
          description: Dataplane instance correctly registered
        "400":
          description: Request was malformed
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ApiErrorDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ApiErrorDetail"
  /v4/secrets:
    put:
      tags:
      - Secret v4
      description: "Updates a secret with the given ID if it exists. If the secret\
        \ is not found, no further action is taken. "
      operationId: updateSecretV4
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/secret-schema"
      responses:
        "204":
          description: Secret was updated successfully
        "400":
          description: "Request was malformed, e.g. id was null"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/api-error-schema"
        "404":
          description: "Secret could not be updated, because it does not exist."
    post:
      tags:
      - Secret v4
      description: Creates a new secret.
      operationId: createSecretV4
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/secret-schema"
      responses:
        "200":
          description: Secret was created successfully. Returns the secret Id and
            created timestamp
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/id-response-schema"
        "400":
          description: Request body was malformed
          content:
            application/json:
              schema:
                type: array
