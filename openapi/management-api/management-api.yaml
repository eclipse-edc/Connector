      required:
      - '@type'
      - operandLeft
      - operandRight
      - operator
      type: object
      properties:
        '@type':
          type: string
        operandLeft:
          type: string
        operandRight: {}
        operator:
          type: string
    CelExpressionTestRequest_rightOperand:
      oneOf:
      - type: string
      - type: object
    PolicyClass_profile:
      oneOf:
      - type: array
        items:
          type: string
      - type: string
    Asset_properties:
      type: object
      properties:
        conformsTo:
          type: string
      example:
        key: value
    Distribution_accessService:
      oneOf:
      - type: string
      - $ref: "#/components/schemas/DataService"
